version: '3.8'

services:
  # 收费管理系统应用
  charging-management:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: charging-management:latest
    container_name: charging-management
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xms512m -Xmx1024m -XX:+UseG1GC -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0
      - SERVER_PORT=8080
      # 数据库配置（使用 H2 文件模式，数据持久化到卷）
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/app/data/chargingdb
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.h2.Driver
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=
      # JWT 配置
      - JWT_SECRET=${JWT_SECRET:-charging-management-system-jwt-secret-key-2024-enterprise-grade}
      - JWT_EXPIRATION=86400000
      # 日志级别
      - LOGGING_LEVEL_COM_CHARGING=INFO
    volumes:
      # 数据持久化
      - charging-data:/app/data
      # 日志持久化
      - ./logs:/app/logs
    networks:
      - charging-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1.5G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: charging-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      charging-management:
        condition: service_healthy
    networks:
      - charging-network
    profiles:
      - with-nginx

volumes:
  charging-data:
    driver: local

networks:
  charging-network:
    driver: bridge
